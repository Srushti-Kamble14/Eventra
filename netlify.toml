[build]
  command = "npm run build"
  publish = "build"

# SPA fallback – all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Basic security headers (adjust as needed)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
